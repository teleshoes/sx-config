infobar, \
  klomp-info --format='%s %s %s   #%s %s\nstatus: %s %s %s %s' \
    percent pos len number \
    title \
    running paused runcmds ended \
  ;

PAUSE,     Adwaita:media-playback-pause-symbolic,  klomp-cmd pause
SEEK -10,  Adwaita:media-seek-backward-symbolic,   klomp-cmd seek -10
VOL-100,   Adwaita:audio-volume-medium-symbolic,   pulse-vol 100 ; vol 11
VOL-150,   Adwaita:audio-volume-high-symbolic,     pulse-vol 150 ; vol 11

rowbreak

DBL-ON,    Adwaita:input-touchpad-symbolic,        mcetool -M unlock ; mcetool -z always
DBL-OFF,   ghibli:noface,                          mcetool -M disabled ; mcetool -z never
LOCK,      Adwaita:changes-prevent-symbolic,       lock

infobar, \
  klomp-info --format='+%d: %.10s|%.10s | %.10s | %s' \
    index number title artist album \
    +1 +2 +3 \
  ;

colbreak
infobar, echo -ne '|'; date +'%Y-%m-%d   %H:%M:%S'
infobar, echo -ne '|'; /home/nemo/bin/lap --read -c -s
LAP,       550,550, meegotouch:icon-s-time,        /home/nemo/bin/lap --put
